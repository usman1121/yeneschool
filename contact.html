<!doctype html>
<html lang="en" class="dark" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Contact YeneSchool to discuss school management setup, pricing, implementation, support, and product questions."
    />
    <meta name="theme-color" content="#080b12" data-theme-color />
    <script>
      (() => {
        try {
          const storedTheme = localStorage.getItem("theme");
          const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          const theme = storedTheme || (prefersDark ? "dark" : "light");
          document.documentElement.classList.toggle("dark", theme === "dark");
          document.documentElement.classList.toggle("light", theme === "light");
          document.documentElement.dataset.theme = theme;
        } catch {
          document.documentElement.classList.add("dark");
          document.documentElement.dataset.theme = "dark";
        }
      })();
    </script>
    <title>Contact YeneSchool | School Management System</title>
