<!doctype html>
<html lang="en" class="dark" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="YeneSchool Developer Platform gives schools and vendors fast APIs, webhooks, SDKs, and embedded workflows for education operations."
    />
    <meta name="theme-color" content="#080b12" data-theme-color />
    <script>
      (() => {
        try {
          const storedTheme = localStorage.getItem("theme");
          const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          const theme = storedTheme || (prefersDark ? "dark" : "light");
          document.documentElement.classList.toggle("dark", theme === "dark");
          document.documentElement.classList.toggle("light", theme === "light");
          document.documentElement.dataset.theme = theme;
        } catch {
          document.documentElement.classList.add("dark");
          document.documentElement.dataset.theme = "dark";
        }
      })();
    </script>
    <title>YeneSchool DevKit | School API Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/png" href="/assets/favicon.png" />

    <link rel="stylesheet" crossorigin href="/assets/main-DTToB9lK.css">
  </head>

  </body>
</html>
